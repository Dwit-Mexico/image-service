# mTLS para el image-service — requiere Gateway API con soporte de TLS (ej: Envoy Gateway, Istio)
#
# OPCIÓN A — Envoy Gateway (gateway.envoyproxy.io)
# Crea un Gateway dedicado que exige certificado cliente.
# El header X-Forwarded-Client-Cert es inyectado automáticamente por Envoy.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: image-service-gateway
  namespace: default
spec:
  gatewayClassName: eg           # reemplaza con tu GatewayClass
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: image-service-tls-secret   # Secret con tls.crt + tls.key
        # mTLS: certificado de la CA que firmó los certs de los proyectos
        options:
          gateway.envoyproxy.io/ca-secret: image-service-ca-secret
      allowedRoutes:
        namespaces:
          from: Same
---
# Secret con el certificado del servidor
# kubectl create secret tls image-service-tls-secret \
#   --cert=server.crt --key=server.key
#
# Secret con la CA para verificar clientes
# kubectl create secret generic image-service-ca-secret \
#   --from-file=ca.crt=ca.crt
