apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: image-service-route
  namespace: default
spec:
  parentRefs:
    - name: gateway-api
      namespace: default

  hostnames:
    - "image-service.dwitmexico.com"

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: image-service
          port: 80
