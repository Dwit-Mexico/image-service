name: Apply TLS Secrets

# Se corre manualmente:
#   - Primera vez al desplegar
#   - Cuando se renueva algún certificado
on:
  workflow_dispatch:

jobs:
  apply-tls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy manifests
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "k8s/mtls-policy.yaml"
          target: "/tmp/image-service-k8s"

      - name: Write certs, apply secrets and policy
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_CRT: ${{ secrets.TLS_SERVER_CRT }}
          SERVER_KEY: ${{ secrets.TLS_SERVER_KEY }}
          CA_CRT: ${{ secrets.TLS_CA_CRT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: SERVER_CRT,SERVER_KEY,CA_CRT
          script: |
            echo "$SERVER_CRT" > /tmp/tls.crt
            echo "$SERVER_KEY" > /tmp/tls.key
            echo "$CA_CRT"     > /tmp/ca.crt

            # Secret TLS del servidor
            kubectl create secret tls image-service-tls-secret \
              --cert=/tmp/tls.crt \
              --key=/tmp/tls.key \
              --dry-run=client -o yaml | kubectl apply -f -

            # Secret CA para verificar certs cliente
            kubectl create secret generic image-service-ca-secret \
              --from-file=ca.crt=/tmp/ca.crt \
              --dry-run=client -o yaml | kubectl apply -f -

            rm -f /tmp/tls.crt /tmp/tls.key /tmp/ca.crt

            # ClientTrafficPolicy — habilita mTLS en el listener https-mtls
            kubectl apply -f /tmp/image-service-k8s/k8s/mtls-policy.yaml

            echo "TLS secrets y policy aplicados correctamente"
