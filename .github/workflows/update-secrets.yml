name: Update Secrets

on:
  workflow_dispatch:

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Update secrets and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DEFAULT_CONTAINER: ${{ vars.DEFAULT_CONTAINER }}
          PROJECT_VELVET: ${{ secrets.PROJECT_VELVET }}
          PROJECT_PIXEL_SOLIDARY: ${{ secrets.PROJECT_PIXEL_SOLIDARY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: AZURE_STORAGE_CONNECTION_STRING,DEFAULT_CONTAINER,PROJECT_VELVET,PROJECT_PIXEL_SOLIDARY
          script: |
            kubectl create secret generic image-service \
              --from-literal=AZURE_STORAGE_CONNECTION_STRING="$AZURE_STORAGE_CONNECTION_STRING" \
              --from-literal=DEFAULT_CONTAINER="$DEFAULT_CONTAINER" \
              --from-literal=PROJECT_VELVET="$PROJECT_VELVET" \
              --from-literal=PROJECT_PIXEL_SOLIDARY="$PROJECT_PIXEL_SOLIDARY" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl rollout restart deployment/image-service
            kubectl rollout status deployment/image-service --timeout=60s
